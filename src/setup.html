<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celeste POS — Configuración Inicial</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1a1a2e;
    }
    .setup-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      padding: 48px 40px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      border-radius: 16px;
      overflow: hidden;
    }
    .logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
      color: #1a1a2e;
    }
    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .form-group {
      text-align: left;
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      color: #1a1a2e;
    }
    .form-group input:focus {
      border-color: #f97316;
      box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
    }
    .form-group input::placeholder {
      text-transform: none;
      letter-spacing: normal;
      font-weight: 400;
      font-size: 14px;
      color: #9ca3af;
    }
    .hint {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 8px;
      line-height: 1.4;
    }
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: #f97316;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover {
      background: #ea580c;
    }
    .btn-primary:active {
      transform: scale(0.98);
    }
    .btn-primary:disabled {
      background: #d1d5db;
      cursor: not-allowed;
      transform: none;
    }
    .error-msg {
      display: none;
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: left;
    }
    .error-msg.visible {
      display: block;
    }
    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 16px;
      font-size: 13px;
      color: #6b7280;
    }
    .loading.visible {
      display: flex;
    }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #e5e7eb;
      border-top-color: #f97316;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .footer {
      margin-top: 24px;
      font-size: 11px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="setup-card">
    <div class="logo">
      <img src="../assets/icon.png" alt="Celeste POS" onerror="this.style.display='none'">
    </div>
    <h1>Celeste POS</h1>
    <p class="subtitle">
      Ingrese el código de su negocio para vincular esta terminal.<br>
      Solo necesita hacer esto una vez.
    </p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="setupForm" onsubmit="return handleSubmit(event)">
      <div class="form-group">
        <label for="tenantCode">Código del Negocio</label>
        <input
          type="text"
          id="tenantCode"
          placeholder="Ej: smc"
          autocomplete="off"
          autofocus
          maxlength="20"
          required
        >
        <p class="hint">
          Este código fue asignado al registrar su negocio.
          Contacte al administrador si no lo conoce.
        </p>
      </div>

      <button type="submit" class="btn-primary" id="submitBtn">
        Vincular Terminal
      </button>
    </form>

    <div class="loading" id="loadingIndicator">
      <div class="spinner"></div>
      <span>Verificando código...</span>
    </div>

    <p class="footer">v<span id="appVersion">1.0.0</span></p>
  </div>

  <script>
    // The main process will inject __SETUP_CONFIG__ before loading this page
    // or we communicate via the preload bridge

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.classList.add('visible');
    }

    function hideError() {
      document.getElementById('errorMsg').classList.remove('visible');
    }

    function setLoading(loading) {
      document.getElementById('submitBtn').disabled = loading;
      document.getElementById('submitBtn').style.display = loading ? 'none' : 'block';
      document.getElementById('loadingIndicator').classList.toggle('visible', loading);
    }

    async function handleSubmit(e) {
      e.preventDefault();
      hideError();

      const code = document.getElementById('tenantCode').value.trim().toLowerCase();

      if (!code) {
        showError('Por favor ingrese el código del negocio.');
        return false;
      }

      if (code.length < 2) {
        showError('El código debe tener al menos 2 caracteres.');
        return false;
      }

      if (!/^[a-z0-9_-]+$/.test(code)) {
        showError('El código solo puede contener letras, números, guiones y guiones bajos.');
        return false;
      }

      setLoading(true);

      // Send the code to the main process for validation and storage
      try {
        if (window.CelesteSetup) {
          const result = await window.CelesteSetup.validateAndSave(code);
          if (result.success) {
            // Main process will handle navigation to the app
            return false;
          } else {
            showError(result.error || 'Código no válido. Verifique e intente de nuevo.');
            setLoading(false);
          }
        } else {
          showError('Error interno: bridge no disponible.');
          setLoading(false);
        }
      } catch (err) {
        showError('Error de conexión. Verifique su internet e intente de nuevo.');
        setLoading(false);
      }

      return false;
    }

    // Set version from injected config
    if (window.__CELESTE_VERSION__) {
      document.getElementById('appVersion').textContent = window.__CELESTE_VERSION__;
    }

    // Auto-focus the input
    document.getElementById('tenantCode').focus();
  </script>
</body>
</html>
