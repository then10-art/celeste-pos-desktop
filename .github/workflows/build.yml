name: Build Desktop App

on:
  push:
    branches: [master, main]
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Fetch latest webapp build from celestepos.live
        shell: bash
        run: |
          echo "=== Fetching latest webapp from celestepos.live ==="
          
          # Remove old webapp files (keep directory structure)
          rm -rf webapp/assets/*
          
          # Download index.html
          curl -sL "https://celestepos.live/index.html" -o webapp/index.html
          echo "Downloaded index.html"
          
          # Download manifest.json
          curl -sL "https://celestepos.live/manifest.json" -o webapp/manifest.json 2>/dev/null || true
          echo "Downloaded manifest.json"
          
          # Extract all asset references from index.html
          ASSETS=$(grep -oP '(?:src|href)="/assets/[^"]+' webapp/index.html | sed 's/.*"//g' | sort -u)
          
          # Download each asset referenced in index.html
          mkdir -p webapp/assets
          for asset in $ASSETS; do
            echo "Downloading $asset..."
            curl -sL "https://celestepos.live${asset}" -o "webapp${asset}"
          done
          
          # Find the main JS bundle and extract ALL lazy-loaded chunk references
          MAIN_JS=$(ls webapp/assets/index-*.js 2>/dev/null | head -1)
          if [ -n "$MAIN_JS" ]; then
            echo "Scanning $MAIN_JS for lazy-loaded chunks..."
            CHUNKS=$(grep -oP '[A-Za-z0-9_]+-[A-Za-z0-9_]+\.js' "$MAIN_JS" | sort -u)
            CHUNK_COUNT=0
            for chunk in $CHUNKS; do
              if [ ! -f "webapp/assets/$chunk" ]; then
                HTTP_CODE=$(curl -sL -o "webapp/assets/$chunk" -w "%{http_code}" "https://celestepos.live/assets/$chunk")
                if [ "$HTTP_CODE" = "200" ]; then
                  CHUNK_COUNT=$((CHUNK_COUNT + 1))
                else
                  rm -f "webapp/assets/$chunk"
                fi
              fi
            done
            echo "Downloaded $CHUNK_COUNT lazy-loaded chunks"
            
            # Also scan each downloaded chunk for nested lazy imports (CSS chunks, etc)
            for jsfile in webapp/assets/*.js; do
              NESTED=$(grep -oP '[A-Za-z0-9_]+-[A-Za-z0-9_]+\.(js|css)' "$jsfile" 2>/dev/null | sort -u)
              for nested in $NESTED; do
                if [ ! -f "webapp/assets/$nested" ]; then
                  HTTP_CODE=$(curl -sL -o "webapp/assets/$nested" -w "%{http_code}" "https://celestepos.live/assets/$nested")
                  if [ "$HTTP_CODE" != "200" ]; then
                    rm -f "webapp/assets/$nested"
                  fi
                fi
              done
            done
            echo "Nested chunk scan complete"
          fi
          
          # Disable service worker in the downloaded index.html
          sed -i "s/if ('serviceWorker' in navigator)/if (false \&\& 'serviceWorker' in navigator)/g" webapp/index.html
          
          # Remove debug collector and analytics scripts
          sed -i '/__manus__\/debug-collector/d' webapp/index.html
          sed -i '/manus-analytics/d' webapp/index.html
          sed -i '/data-website-id/d' webapp/index.html
          
          echo "=== Webapp fetch complete ==="
          echo "Files in webapp/assets/:"
          ls webapp/assets/ | wc -l
          echo "asset files downloaded"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Windows installer (x64)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            dist/*.exe
            dist/*.yml
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify-server:
    name: Notify CelestePOS Server
    needs: [release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifacts (for latest.yml parsing)
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist/

      - name: Parse latest.yml and notify server
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Version: $VERSION"

          # Parse latest.yml from electron-builder output
          LATEST_YML="dist/latest.yml"
          if [ -f "$LATEST_YML" ]; then
            SHA512=$(grep "^sha512:" "$LATEST_YML" | head -1 | awk '{print $2}')
            FILE_SIZE=$(grep "size:" "$LATEST_YML" | head -1 | awk '{print $2}')
          else
            echo "Warning: latest.yml not found, using empty values"
            SHA512=""
            FILE_SIZE=0
          fi

          echo "SHA512: $SHA512"
          echo "File size: $FILE_SIZE"

          # Get release notes from GitHub API
          RELEASE_NOTES=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${GITHUB_REF_NAME}" \
            | jq -r '.body // "Actualización a la versión '"$VERSION"'."' \
            | head -c 1000)

          echo "Release notes: $RELEASE_NOTES"

          # Call the webhook on celestepos.live
          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "https://celestepos.live/api/desktop-release" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DESKTOP_WEBHOOK_SECRET }}" \
            -d "$(jq -n \
              --arg version "$VERSION" \
              --arg releaseDate "$(date -u +%Y-%m-%dT%H:%M:%S.000Z)" \
              --arg sha512 "$SHA512" \
              --argjson fileSize "${FILE_SIZE:-0}" \
              --arg releaseNotes "$RELEASE_NOTES" \
              '{version: $version, releaseDate: $releaseDate, sha512: $sha512, fileSize: $fileSize, releaseNotes: $releaseNotes}')")

          echo "Server response ($HTTP_STATUS):"
          cat /tmp/response.json

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::warning::Server notification failed with status $HTTP_STATUS"
          fi
